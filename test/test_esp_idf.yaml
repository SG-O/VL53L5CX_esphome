esphome:
  name: vl53l5cx_test_esp_idf
  friendly_name: VL53L5CX_Test_ESP_IDF

esp32:
  variant: esp32
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../components

logger:

i2c:
  - sda: GPIO21
    scl: GPIO22

vl53l5cx:
  address: 0x29

sensor:
  - platform: vl53l5cx
    name: single_distance

text_sensor:
  - platform: vl53l5cx
    name: float_distance
