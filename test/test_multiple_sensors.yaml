esphome:
  name: vl53l5cx_test_multi
  friendly_name: VL53L5CX_Test_Multi

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../components

logger:

i2c:
  - id: bus_a
    sda: GPIO6
    scl: GPIO7

vl53l5cx:
  - id: sensor_01
    address: 0x29
    i2c_id: bus_a
    lp_pin: GPIO1
    resolution: 4X4
    ranging_frequency: 30Hz
    ranging_mode: CONTINUOUS
    continuous_update: true

  - id: sensor_02
    address: 0x2A
    i2c_id: bus_a
    lp_pin: GPIO2
    resolution: 4X4
    ranging_frequency: 30Hz
    ranging_mode: CONTINUOUS
    continuous_update: true

sensor:
  - platform: vl53l5cx
    vl53l5cx_id: sensor_01
    name: sensor01_distance
  - platform: vl53l5cx
    vl53l5cx_id: sensor_02
    name: sensor02_distance

text_sensor:
  - platform: vl53l5cx
    vl53l5cx_id: sensor_01
    name: sensor01_csv
    output_formatting: CSV
    output_data: FLOAT_DISTANCE
  - platform: vl53l5cx
    vl53l5cx_id: sensor_02
    name: sensor02_csv
    output_formatting: CSV
    output_data: FLOAT_DISTANCE
