esphome:
  name: vl53l_mz_test_text_formats
  friendly_name: VL53L_MZ_Test_Text_Formats

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../../components

logger:

i2c:
  - sda: GPIO6
    scl: GPIO7

vl53l_mz:
  model: VL53L5CX
  address: 0x29

text_sensor:
  # RAW_DISTANCE with all formats
  - platform: vl53l_mz
    name: raw_distance_csv
    output_formatting: CSV
    output_data: RAW_DISTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: raw_distance_table
    output_formatting: TABLE
    output_data: RAW_DISTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: raw_distance_binary
    output_formatting: BINARY
    output_data: RAW_DISTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: raw_distance_png
    output_formatting: PNG
    output_data: RAW_DISTANCE
    flip_x: false
    flip_y: false

  # FLOAT_DISTANCE with all formats
  - platform: vl53l_mz
    name: float_distance_csv
    output_formatting: CSV
    output_data: FLOAT_DISTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: float_distance_table
    output_formatting: TABLE
    output_data: FLOAT_DISTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: float_distance_binary
    output_formatting: BINARY
    output_data: FLOAT_DISTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: float_distance_png
    output_formatting: PNG
    output_data: FLOAT_DISTANCE
    flip_x: false
    flip_y: false

  # RAW_SIGMA with all formats
  - platform: vl53l_mz
    name: raw_sigma_csv
    output_formatting: CSV
    output_data: RAW_SIGMA
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: raw_sigma_table
    output_formatting: TABLE
    output_data: RAW_SIGMA
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: raw_sigma_binary
    output_formatting: BINARY
    output_data: RAW_SIGMA
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: raw_sigma_png
    output_formatting: PNG
    output_data: RAW_SIGMA
    flip_x: false
    flip_y: false

  # FLOAT_SIGMA with all formats
  - platform: vl53l_mz
    name: float_sigma_csv
    output_formatting: CSV
    output_data: FLOAT_SIGMA
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: float_sigma_table
    output_formatting: TABLE
    output_data: FLOAT_SIGMA
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: float_sigma_binary
    output_formatting: BINARY
    output_data: FLOAT_SIGMA
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: float_sigma_png
    output_formatting: PNG
    output_data: FLOAT_SIGMA
    flip_x: false
    flip_y: false

  # REFLECTANCE with all formats (including flip variations)
  - platform: vl53l_mz
    name: reflectance_csv_noflip
    output_formatting: CSV
    output_data: REFLECTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: reflectance_csv_flipx
    output_formatting: CSV
    output_data: REFLECTANCE
    flip_x: true
    flip_y: false
  - platform: vl53l_mz
    name: reflectance_csv_flipy
    output_formatting: CSV
    output_data: REFLECTANCE
    flip_x: false
    flip_y: true
  - platform: vl53l_mz
    name: reflectance_csv_flipboth
    output_formatting: CSV
    output_data: REFLECTANCE
    flip_x: true
    flip_y: true
  - platform: vl53l_mz
    name: reflectance_table
    output_formatting: TABLE
    output_data: REFLECTANCE
    flip_x: true
    flip_y: true
  - platform: vl53l_mz
    name: reflectance_binary
    output_formatting: BINARY
    output_data: REFLECTANCE
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: reflectance_png
    output_formatting: PNG
    output_data: REFLECTANCE
    flip_x: false
    flip_y: false

  # TARGET_COUNT with all formats
  - platform: vl53l_mz
    name: target_count_csv
    output_formatting: CSV
    output_data: TARGET_COUNT
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: target_count_table
    output_formatting: TABLE
    output_data: TARGET_COUNT
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: target_count_binary
    output_formatting: BINARY
    output_data: TARGET_COUNT
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: target_count_png
    output_formatting: PNG
    output_data: TARGET_COUNT
    flip_x: false
    flip_y: false

  # STATUS with all formats
  - platform: vl53l_mz
    name: status_csv
    output_formatting: CSV
    output_data: STATUS
    flip_x: false
    flip_y: false
  - platform: vl53l_mz
    name: status_table
    output_formatting: TABLE
    output_data: STATUS
    flip_x: true
    flip_y: false
  - platform: vl53l_mz
    name: status_binary
    output_formatting: BINARY
    output_data: STATUS
    flip_x: false
    flip_y: true
  - platform: vl53l_mz
    name: status_png
    output_formatting: PNG
    output_data: STATUS
    flip_x: true
    flip_y: true
