esphome:
  name: vl53l_mz_test_default
  friendly_name: VL53L_MZ_Test_Default

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../../components

logger:

i2c:
  - sda: GPIO6
    scl: GPIO7

vl53l_mz:
  model: VL53L5CX
  address: 0x29

sensor:
  - platform: vl53l_mz
    name: single_distance

text_sensor:
  - platform: vl53l_mz
    name: float_distance
