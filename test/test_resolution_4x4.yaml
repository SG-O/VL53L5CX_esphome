esphome:
  name: vl53l5cx_test_4x4
  friendly_name: VL53L5CX_Test_4x4

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../components

logger:

i2c:
  - sda: GPIO6
    scl: GPIO7

vl53l5cx:
  address: 0x29
  resolution: 4X4
  ranging_frequency: 60Hz
  ranging_mode: CONTINUOUS
  target_order: CLOSEST
  continuous_update: true

sensor:
  - platform: vl53l5cx
    name: distance
