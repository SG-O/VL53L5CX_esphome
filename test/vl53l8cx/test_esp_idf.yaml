esphome:
  name: vl53l_mz_test_esp_idf
  friendly_name: VL53L_MZ_Test_ESP_IDF

esp32:
  variant: esp32
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../../components

logger:

i2c:
  - sda: GPIO21
    scl: GPIO22

vl53l_mz:
  model: VL53L8CX
  address: 0x29

sensor:
  - platform: vl53l_mz
    name: single_distance

text_sensor:
  - platform: vl53l_mz
    name: float_distance
