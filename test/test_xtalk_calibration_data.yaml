esphome:
  name: vl53l5cx_test_xtalk_data
  friendly_name: VL53L5CX_Test_Xtalk_Data

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../components

logger:

i2c:
  - sda: GPIO6
    scl: GPIO7

vl53l5cx:
  address: 0x29
  resolution: 8X8
  ranging_frequency: 1Hz
  ranging_mode: AUTO
  xtalk_calibration_data: ""

sensor:
  - platform: vl53l5cx
    name: distance
