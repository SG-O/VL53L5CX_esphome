esphome:
  name: vl53l_mz_test_sharpening
  friendly_name: VL53L_MZ_Test_Sharpening

esp32:
  variant: esp32c6
  framework:
    type: esp-idf

external_components:
  - source:
      type: local
      path: ../../components

logger:

i2c:
  - sda: GPIO6
    scl: GPIO7

vl53l_mz:
  model: VL53L7CX
  address: 0x29
  resolution: 8X8
  ranging_frequency: 1Hz
  ranging_mode: AUTO
  sharpening: 50%

sensor:
  - platform: vl53l_mz
    name: distance
